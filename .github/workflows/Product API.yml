name: Extract Product Specific API from DEV APIM

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write 

jobs:
  extract:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Install APIM DevOps Toolkit
      run: |
        dotnet tool install --global Microsoft.Azure.ApiManagement.DevOps.ResourceKit

    - name: Run Extractor
      run: |
        extractor \
          --sourceApimName ${{ secrets.DEV_APIM }} \
          --resourceGroup ${{ secrets.DEV_RG }} \
          --fileFolder ./infra \
          --productNames ${{ secrets.Product_name }} 

    - name: Commit Extracted Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "Auto extract APIM API from DEV"
        git push
