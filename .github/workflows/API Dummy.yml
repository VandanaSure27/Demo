name: Sync APIM Dev Export
 
on:
  workflow_dispatch:
    inputs:
      api_or_product_id:
        description: "API ID OR Product ID in APIM"
        required: true
      export_type:
        description: "Select what to export"
        required: true
        type: choice
        options:
          - api
          - api-policy
          - product
          - product-apis
          - all
 
permissions:
  id-token: write
  contents: write
 
jobs:
  export-apim:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
 
      - name: Azure Login (OIDC Recommended)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Create export folder
        run: mkdir -p export
 
      - name: Export from DEV APIM
        run: |
          set -e
 
          echo "Export Type: ${{ github.event.inputs.export_type }}"
          echo "Target: ${{ github.event.inputs.api_or_product_id }}"
 
          RG="${{ secrets.DEV_RG }}"
          APIM="${{ secrets.DEV_APIM }}"
          ID="${{ github.event.inputs.api_or_product_id }}"
          TYPE="${{ github.event.inputs.export_type }}"
 
          # Safe file name (replace spaces with dashes)
          SAFE_ID=$(echo "$ID" | tr ' ' '-')
 
          if [ "$TYPE" = "api" ] || [ "$TYPE" = "all" ]; then
            echo "Exporting API..."
            az apim api export \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --api-id "$ID" \
              --export-format OpenApiJsonFile \
              --file-path "export/${SAFE_ID}.json"
          fi
 
          if [ "$TYPE" = "api-policy" ] || [ "$TYPE" = "all" ]; then
            echo "Exporting API Policy..."
            az apim api policy show \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --api-id "$ID" \
              --format rawxml > "export/${SAFE_ID}-policy.xml"
          fi
 
          if [ "$TYPE" = "product" ] || [ "$TYPE" = "all" ]; then
            echo "Exporting Product..."
            az apim product show \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --product-id "$ID" \
              --output json > "export/${SAFE_ID}-product.json"
          fi
 
          if [ "$TYPE" = "product-apis" ] || [ "$TYPE" = "all" ]; then
            echo "Exporting Product APIs..."
            az apim product api list \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --product-id "$ID" \
              --output json > "export/${SAFE_ID}-product-apis.json"
          fi
 
      - name: Verify Export
        run: |
          echo "Exported Files:"
          ls -la export
 
      - name: Commit Exported Files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add export/
          git commit -m "Auto export from DEV APIM" || echo "No changes detected"
          git push

      - name: publish single API artifact
        uses: actions/upload-artifact@v4
        env:
          SINGLE_API_OUTPUT_FOLDER_PATH: "Single API"   # destination folder
        with:
          name: single-api-artifacts
          path: ${{ github.workspace }}/${{ env.SINGLE_API_OUTPUT_FOLDER_PATH }}
