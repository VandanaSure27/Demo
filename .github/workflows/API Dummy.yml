name: Sync APIM Dev Export

on:
  workflow_dispatch:
    inputs:
      api_or_product_id:
        description: "API ID OR Product ID in APIM"
        required: true
      export_type:
        description: "Select what to export"
        required: true
        type: choice
        options:
          - api
          - api-policy
          - product
          - product-apis
          - all

permissions:
  id-token: write
  contents: write

jobs:
  export-apim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create export folder
        run: mkdir -p export

      - name: Export from DEV APIM
        run: |
          set -e

          RG="${{ secrets.DEV_RG }}"
          APIM="${{ secrets.DEV_APIM }}"
          ID="${{ github.event.inputs.api_or_product_id }}"
          TYPE="${{ github.event.inputs.export_type }}"

          echo "Export Type: $TYPE"
          echo "Target: $ID"

          SAFE_ID=$(echo "$ID" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')

          if [ "$TYPE" = "api" ] || [ "$TYPE" = "all" ]; then
            az apim api export \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --api-id "$ID" \
              --export-format OpenApiJsonFile \
              --file-path "export/${SAFE_ID}.json"
          fi

          if [ "$TYPE" = "api-policy" ] || [ "$TYPE" = "all" ]; then
            az apim api policy show \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --api-id "$ID" \
              --format rawxml > "export/${SAFE_ID}-policy.xml"
          fi

          if [ "$TYPE" = "product" ] || [ "$TYPE" = "all" ]; then
            az apim product show \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --product-id "$ID" \
              --output json > "export/${SAFE_ID}-product.json"
          fi

          if [ "$TYPE" = "product-apis" ] || [ "$TYPE" = "all" ]; then
            az apim product api list \
              --resource-group "$RG" \
              --service-name "$APIM" \
              --product-id "$ID" \
              --output json > "export/${SAFE_ID}-product-apis.json"
          fi

      - name: Verify Export
        run: ls -la export

      - name: Commit Exported Files
        run: |
          set -e

          CURRENT_BRANCH=${GITHUB_REF#refs/heads/}

          echo "Committing to branch: $CURRENT_BRANCH"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout "$CURRENT_BRANCH"

          git add export/
          git commit -m "APIM export for ${{ github.event.inputs.api_or_product_id }}" || echo "No changes to commit"
          git push origin "$CURRENT_BRANCH"
