name: APIM Dev Export

on:
  workflow_dispatch:
    inputs:
      apim_name:
        description: 'Source APIM Name'
        required: true 
      resource_type:
        description: 'Type of resource to export (api, product, policy)'
        required: true
        default: 'api'
      resource_name:
        description: 'Name/ID of the resource (e.g., my-api, my-product)'
        required: true

permissions:
  id-token: write
  contents: write 

jobs:
  export-deploy:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Normalize resource name (replace spaces)
        id: normalize
        run: |
          SAFE_NAME=$(echo "${{ github.event.inputs.resource_name }}" | tr ' ' '_')
          echo "SAFE_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: Selective Export from DEV APIM
        run: |
          case "${{ github.event.inputs.resource_type }}" in
            api)
              az apim api export \
                --resource-group "${{ secrets.DEV_RG }}" \
                --service-name "${{ secrets.DEV_APIM }}" \
                --api-id "${{ github.event.inputs.resource_name }}" \
                --export-format OpenApiJsonFile \
                --file-path "infra/APIM/${SAFE_NAME}.json"
              ;;
            product)
              az apim product show \
                --resource-group "${{ secrets.DEV_RG }}" \
                --service-name "${{ secrets.DEV_APIM }}" \
                --product-id "${{ github.event.inputs.resource_name }}" \
                > "infra/APIM/${SAFE_NAME}-product.json"
              ;;
            policy)
              az apim api policy show \
                --resource-group "${{ secrets.DEV_RG }}" \
                --service-name "${{ secrets.DEV_APIM }}" \
                --api-id "${{ github.event.inputs.resource_name }}" \
                > "infra/APIM/${SAFE_NAME}-policy.xml"
              ;;
          esac

      - name: Verify Export
        run: |
          echo "Files in infra/APIM:"
          ls -la infra/APIM

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH_NAME="Feature-${{ inputs.apim_name }}-$(date +%Y%m%d%H%M)"
          git checkout -b $BRANCH_NAME
          git add apim_artifacts
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Extract APIM settings from ${{ inputs.apim_name }}"
            git push origin $BRANCH_NAME
            echo "::notice::Extraction complete! Check branch '$BRANCH_NAME' for your files."
            fi  
