name: APIM Dev Export

on:
  workflow_dispatch:
    inputs:
      apim_name:
        description: 'Source APIM Name'
        required: true 
      resource_type:
        description: 'Type of resource to export (api, product, policy)'
        required: true
        default: 'api'
      resource_name:
        description: 'Name/ID of the resource (e.g., my-api, my-product)'
        required: true

permissions:
  id-token: write
  contents: write 

jobs:
  export-deploy:
    runs-on: ubuntu-latest 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Selective Export from DEV APIM
        run: |
          case "${{ github.event.inputs.resource_type }}" in
            api)
              az apim api export \
                --resource-group ${{ secrets.DEV_RG }} \
                --service-name ${{ secrets.DEV_APIM }} \
                --api-id ${{ github.event.inputs.resource_name }} \
                --export-format OpenApiJsonFile \
                --file-path infra/APIM/${{ github.event.inputs.resource_name }}.json
              ;;
            product)
              az apim product show \
                --resource-group ${{ secrets.DEV_RG }} \
                --service-name ${{ secrets.DEV_APIM }} \
                --product-id ${{ github.event.inputs.resource_name }} \
                > infra/APIM/${{ github.event.inputs.resource_name }}-product.json
              ;;
            policy)
              az apim api policy show \
                --resource-group ${{ secrets.DEV_RG }} \
                --service-name ${{ secrets.DEV_APIM }} \
                --api-id ${{ github.event.inputs.resource_name }} \
                > infra/APIM/${{ github.event.inputs.resource_name }}-policy.xml
              ;;
          esac

      - name: Verify Export
        run: |
          echo "Files in infra/APIM:"
          ls -la infra/APIM

      - name: Upload Exported Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apim-export
          path: infra/APIM/


      - name: Commit exported artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/APIM/
          git commit -m "Selective export from DEV APIM" || echo "No changes"
          git push
