name: APIM Git Import to Target

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  import-apim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login (Target)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TARGET_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TARGET_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TARGET_AZURE_SUBSCRIPTION_ID }}

      - name: Import to Target APIM
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ secrets.TARGET_RG }}"
          APIM="${{ secrets.TARGET_APIM }}"
          SUB="${{ secrets.TARGET_AZURE_SUBSCRIPTION_ID }}"
          API_VERSION="2022-08-01"

          echo "========================================="
          echo "Importing into Target:"
          echo "RG   : $RG"
          echo "APIM : $APIM"
          echo "========================================="

          ############################################
          # SERVICE COMPONENTS
          ############################################
          if [ -d "apim/service" ]; then
            echo "Importing Named Values..."
            if [ -f "apim/service/named-values.json" ]; then
              jq -c '.value[]' apim/service/named-values.json | while read NV; do
                NAME=$(echo "$NV" | jq -r '.name')
                az rest --method put \
                  --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/namedValues/$NAME?api-version=$API_VERSION" \
                  --body "$NV" \
                  >/dev/null
              done
            fi
          fi

          ############################################
          # APIs
          ############################################
          if [ -d "apim/apis" ]; then
            echo "Importing APIs..."

            for DIR in apim/apis/*; do
              API_ID=$(basename "$DIR")

              if [ -f "$DIR/openapi.json" ]; then
                echo "Importing API: $API_ID"

                az apim api import \
                  --resource-group "$RG" \
                  --service-name "$APIM" \
                  --api-id "$API_ID" \
                  --path "$API_ID" \
                  --specification-format OpenApi \
                  --specification-path "$DIR/openapi.json" \
                  --subscription-required false \
                  --overwrite true
              fi

              if [ -f "$DIR/policy.xml" ]; then
                az apim api policy import \
                  --resource-group "$RG" \
                  --service-name "$APIM" \
                  --api-id "$API_ID" \
                  --xml-file "$DIR/policy.xml"
              fi
            done
          fi

          ############################################
          # PRODUCTS
          ############################################
          if [ -d "apim/products" ]; then
            echo "Importing Products..."

            for DIR in apim/products/*; do
              PRODUCT_ID=$(basename "$DIR")

              if [ -f "$DIR/product.json" ]; then
                az apim product create \
                  --resource-group "$RG" \
                  --service-name "$APIM" \
                  --product-id "$PRODUCT_ID" \
                  --display-name "$PRODUCT_ID" \
                  --subscription-required true \
                  --state published \
                  --approval-required false || true
              fi

              if [ -f "$DIR/apis.json" ]; then
                jq -r '.[].name' "$DIR/apis.json" | while read API_NAME; do
                  az apim product api add \
                    --resource-group "$RG" \
                    --service-name "$APIM" \
                    --product-id "$PRODUCT_ID" \
                    --api-id "$API_NAME" || true
                done
              fi
            done
          fi

          ############################################
          # TAGS
          ############################################
          if [ -d "apim/tags" ]; then
            echo "Importing Tags..."

            for FILE in apim/tags/*.json; do
              TAG=$(basename "$FILE" .json)

              az rest --method put \
                --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/tags/$TAG?api-version=$API_VERSION" \
                --body @"$FILE" \
                >/dev/null
            done
          fi

          ############################################
          # SUBSCRIPTIONS (Masked - recreate)
          ############################################
          if [ -d "apim/subscriptions" ]; then
            echo "Creating Subscriptions..."

            for FILE in apim/subscriptions/*.json; do
              SUB_ID=$(basename "$FILE" .json)

              az rest --method put \
                --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/subscriptions/$SUB_ID?api-version=$API_VERSION" \
                --body @"$FILE" \
                >/dev/null || true
            done
          fi

          echo "Import Completed Successfully."
