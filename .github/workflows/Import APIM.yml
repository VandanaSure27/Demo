name: APIM Import to Target

on:
  workflow_dispatch:
    inputs:
      target_rg:
        description: "Target Resource Group"
        required: true
      target_apim:
        description: "Target APIM Name"
        required: true
      import_type:
        description: "Select components to import"
        required: true
        type: choice
        options:
          - service
          - apis
          - products
          - policies
          - subscriptions
          - tags
          - all

permissions:
  id-token: write
  contents: write

jobs:
  import-apim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      ###########################################
      # Federated Login (OIDC)
      ###########################################
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.TARGET_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.TARGET_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.TARGET_AZURE_SUBSCRIPTION_ID }}

      - name: Verify Login
        run: az account show

      ###########################################
      # Import Components
      ###########################################
      - name: Import Selected Components
        shell: bash
        run: |
          set -euo pipefail

          RG="${{ github.event.inputs.target_rg }}"
          APIM="${{ github.event.inputs.target_apim }}"
          SUB="${{ secrets.TARGET_AZURE_SUBSCRIPTION_ID }}"
          TYPE="${{ github.event.inputs.import_type }}"
          API_VERSION="2022-08-01"

          echo "======================================"
          echo "Target RG   : $RG"
          echo "Target APIM : $APIM"
          echo "Import Type : $TYPE"
          echo "======================================"

          ###########################################
          # SERVICE (Named Values)
          ###########################################
          if [[ "$TYPE" == "service" || "$TYPE" == "all" ]]; then
            echo "Importing Named Values..."

            if [ -f "apim/service/named-values.json" ]; then
              jq -c '.value[]' apim/service/named-values.json | while read NV; do
                NAME=$(echo "$NV" | jq -r '.name')

                az rest --method put \
                  --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/namedValues/$NAME?api-version=$API_VERSION" \
                  --body "$NV" >/dev/null
              done
            fi
          fi

          ###########################################
          # APIs (Import OpenAPI properly)
          ###########################################
          if [[ "$TYPE" == "apis" || "$TYPE" == "all" ]]; then
            echo "Importing APIs..."

            for DIR in apim/apis/*; do
              [ -d "$DIR" ] || continue

              API_ID=$(basename "$DIR")

              if [ -f "$DIR/openapi.json" ] && [ -f "$DIR/api.json" ]; then

                API_PATH=$(jq -r '.properties.path' "$DIR/api.json")

                echo "Importing API: $API_ID (path: $API_PATH)"

                az apim api import \
                  --resource-group "$RG" \
                  --service-name "$APIM" \
                  --api-id "$API_ID" \
                  --path "$API_PATH" \
                  --specification-format OpenApi \
                  --specification-path "$DIR/openapi.json"
              fi
            done
          fi

          ###########################################
          # API POLICIES
          ###########################################
          if [[ "$TYPE" == "policies" || "$TYPE" == "all" ]]; then
            echo "Importing API Policies..."

            for DIR in apim/apis/*; do
              [ -d "$DIR" ] || continue

              API_ID=$(basename "$DIR")

              if [ -f "$DIR/policy.xml" ]; then
                echo "Applying policy to $API_ID"

                az apim api policy import \
                  --resource-group "$RG" \
                  --service-name "$APIM" \
                  --api-id "$API_ID" \
                  --xml-file "$DIR/policy.xml"
              fi
            done
          fi

          ###########################################
          # PRODUCTS
          ###########################################
          if [[ "$TYPE" == "products" || "$TYPE" == "all" ]]; then
            echo "Importing Products..."

            for DIR in apim/products/*; do
              [ -d "$DIR" ] || continue

              PRODUCT_ID=$(basename "$DIR")

              echo "Ensuring product exists: $PRODUCT_ID"

              az apim product create \
                --resource-group "$RG" \
                --service-name "$APIM" \
                --product-id "$PRODUCT_ID" \
                --display-name "$PRODUCT_ID" \
                --subscription-required true \
                --state published \
                --approval-required false || true

              if [ -f "$DIR/apis.json" ]; then
                jq -r '.[].name' "$DIR/apis.json" | while read API_NAME; do
                  az apim product api add \
                    --resource-group "$RG" \
                    --service-name "$APIM" \
                    --product-id "$PRODUCT_ID" \
                    --api-id "$API_NAME" || true
                done
              fi
            done
          fi

          ###########################################
          # TAGS
          ###########################################
          if [[ "$TYPE" == "tags" || "$TYPE" == "all" ]]; then
            echo "Importing Tags..."

            for FILE in apim/tags/*.json; do
              [ -f "$FILE" ] || continue

              TAG=$(basename "$FILE" .json)

              az rest --method put \
                --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/tags/$TAG?api-version=$API_VERSION" \
                --body @"$FILE" >/dev/null || true
            done
          fi

          ###########################################
          # SUBSCRIPTIONS (Keys already masked)
          ###########################################
          if [[ "$TYPE" == "subscriptions" || "$TYPE" == "all" ]]; then
            echo "Importing Subscriptions..."

            for FILE in apim/subscriptions/*.json; do
              [ -f "$FILE" ] || continue

              SUB_ID=$(basename "$FILE" .json)

              az rest --method put \
                --url "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.ApiManagement/service/$APIM/subscriptions/$SUB_ID?api-version=$API_VERSION" \
                --body @"$FILE" >/dev/null || true
            done
          fi

          echo "Import completed successfully."
