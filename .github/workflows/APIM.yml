name: APIM Dev Export
 
on:
  workflow_dispatch:
 
permissions:
  id-token: write
  contents: write 
 
jobs:
  export-deploy:
    runs-on: ubuntu-latest 
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
 
      - name: Export API from DEV APIM 
        run: |
          az apim api export \
            --resource-group ${{ secrets.DEV_RG }} \
            --service-name ${{ secrets.DEV_APIM }} \
            --api-id ${{ vars.API_NAME }} \
            --export-format OpenApiJsonFile \
            --file-path infra/APIM
 
      - name: Verify Export
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -la
      - name: Commit exported API
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/APIM/
          git commit -m "Auto export from DEV APIM" || echo "No changes"
          git push
