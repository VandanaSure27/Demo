openapi: 3.0.1
info:
  title: Hello API
  description: Demo_git_latest
  version: '1.0'
servers:
  - url: http://sw-apim-dev-test.azure-api.net/Hello
  - url: https://sw-apim-dev-test.azure-api.net/Hello
paths:
  /hello:
    get:
      summary: Returns a greeting
      description: Returns a greeting
      operationId: get-hello
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
              example:
                message: string
components:
  securitySchemes:
    apiKeyHeader:
      type: apiKey
      name: Ocp-Apim-Subscription-Key
      in: header
    apiKeyQuery:
      type: apiKey
      name: subscription-key
      in: query
security:
  - apiKeyHeader: [ ]
  - apiKeyQuery: [ ]